name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers the build whenever you push to main

permissions:
  contents: write # Allows the action to push built files to your gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # This is where your custom Vite deployer block actually belongs:
      - name: Vite Github Pages Deployer
        uses: skywarth/vite-github-pages-deployer@v1.5.0
        with:
          public_base_path: /Portfolio/   # Maps assets smoothly to your subdirectory URL
          build_path: ./dist
          package_manager: npm
